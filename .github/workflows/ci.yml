name: Build and Push Docker Images

on:
  push:
    branches:
      - dev    # Development grana
      - main   # Production grana

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout koda
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login na Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Determine tag based on branch
      - name: Set Docker tag
        id: docker-tag
        run: |
          if [ "${GITHUB_REF##*/}" == "main" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          else
            echo "TAG=dev" >> $GITHUB_ENV
          fi

      # --- TESTOVI ---
      - name: Run tests - procurement-service
        run: |
          cd procurement-service
          ./mvnw test

      - name: Run tests - sales-service
        run: |
          cd sales-service
          ./mvnw test

      # 4. Build & push user-service
      - name: Build and push user-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ env.TAG }} ./user-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ env.TAG }}

      # 5. Build & push product-service
      - name: Build and push product-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ env.TAG }} ./product-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ env.TAG }}

      # 6. Build & push procurement-service
      - name: Build and push procurement-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/procurement-service:${{ env.TAG }} ./procurement-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/procurement-service:${{ env.TAG }}

      # 7. Build & push sales-service
      - name: Build and push sales-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sales-service:${{ env.TAG }} ./sales-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sales-service:${{ env.TAG }}

      # 8. Build & push warehouse-service
      - name: Build and push warehouse-service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/warehouse-service:${{ env.TAG }} ./warehouse-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/warehouse-service:${{ env.TAG }}